# ── 개발 환경 (docker compose up) ──
# 특징: volume mount, hot reload, adminer, 디버그 포트 노출
# 사용: docker compose up -d

services:
  db:
    image: postgres:16-alpine
    container_name: puco_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-puco_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: puco_rl
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-puco_user} -d puco_rl"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: puco_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: puco_backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-puco_user}:${POSTGRES_PASSWORD}@db:5432/puco_rl
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - PYTHONPATH=/app:/PuCo_RL
      - DEBUG=true
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - ./PuCo_RL:/PuCo_RL:ro
      - ./data/logs:/data/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: puco_frontend
    environment:
      - VITE_API_TARGET=http://backend:8000
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: puco_adminer
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
