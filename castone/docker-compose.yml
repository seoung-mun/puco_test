version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: puco_db
    environment:
      POSTGRES_USER: puco_user
      POSTGRES_PASSWORD: puco_password
      POSTGRES_DB: puco_rl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U puco_user -d puco_rl"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: puco_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: puco_backend
    environment:
      - DATABASE_URL=postgresql://puco_user:puco_password@db:5432/puco_rl
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app:/PuCo_RL
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./PuCo_RL:/PuCo_RL:ro
      - ./data/logs:/data/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: puco_frontend
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
      - VITE_WS_URL=ws://localhost:8000/api/v1/ws
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    command: npm run dev -- --host

volumes:
  pgdata:
  redisdata:
