services:
  db:
    image: postgres:16-alpine
    container_name: puco_db
    environment:
      POSTGRES_USER: puco_user
      POSTGRES_PASSWORD: puco_password
      POSTGRES_DB: puco_rl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U puco_user -d puco_rl"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: puco_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: puco_backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://puco_user:puco_password@db:5432/puco_rl
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app:/PuCo_RL
      # GOOGLE_CLIENT_ID is loaded from .env via env_file above
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./PuCo_RL:/PuCo_RL:ro
      - ./data/logs:/data/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: puco_frontend
    env_file:
      - .env
    environment:
      - VITE_API_TARGET=http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    command: npm run dev -- --host --port 3000

  adminer:
    image: adminer:latest
    container_name: puco_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
