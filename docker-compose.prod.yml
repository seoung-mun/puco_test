# ── 프로덕션 환경 (docker compose -f docker-compose.prod.yml up) ──
# 특징: 이미지 빌드, non-root, healthcheck, 네트워크 격리, 리소스 제한
# 사용: docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    container_name: puco_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-puco_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: puco_rl
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-puco_user} -d puco_rl"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: puco_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.1"
          memory: 128M

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: puco_backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-puco_user}:${POSTGRES_PASSWORD}@db:5432/puco_rl
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - PYTHONPATH=/app:/PuCo_RL
      - DEBUG=false
    volumes:
      - ./data/logs:/data/logs
    networks:
      - internal
      - frontend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_TARGET: ""
    container_name: puco_frontend
    ports:
      - "0.0.0.0:80:80"
    networks:
      - frontend
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

networks:
  internal:
    driver: bridge
    internal: true
  frontend:
    driver: bridge

volumes:
  pgdata:
  redisdata:
